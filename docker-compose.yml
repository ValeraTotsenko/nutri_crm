version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutrinet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      OWNER_TELEGRAM_ID: ${OWNER_TELEGRAM_ID}
      WEBAPP_URL: ${WEBAPP_URL}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      TZ: ${TZ:-Europe/Kyiv}
      NOTIFICATIONS_HOUR: ${NOTIFICATIONS_HOUR:-10}
      NOTIFICATIONS_TZ: ${NOTIFICATIONS_TZ:-Europe/Kyiv}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutrinet

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - nutrinet

volumes:
  pgdata:
    driver: local

networks:
  nutrinet:
    driver: bridge
